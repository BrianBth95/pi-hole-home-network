version: "3.8"

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    network_mode: "host"

    environment:
      TZ: "Europe/Amsterdam"
      WEBPASSWORD: "admin"                # change this
      PIHOLE_DNS_: "127.0.0.1#5053"       # point Pi-hole to cloudflared DoH
      DNSMASQ_LISTENING: "all"
      ServerIP: "192.168.2.36"
      VIRTUAL_HOST: "pi.hole"
      SSL_CERT: "/etc/ssl/certs/pihole.crt"
      SSL_KEY: "/etc/ssl/private/pihole.key"

    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "53:53/tcp"
      - "53:53/udp"

    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
      - /etc/ssl/certs/pihole.crt:/etc/ssl/certs/pihole.crt:ro
      - /etc/ssl/private/pihole.key:/etc/ssl/private/pihole.key:ro

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: "host"
    command: >
      proxy-dns
      --port 5053
      --upstream https://1.1.1.1/dns-query
      --upstream https://1.0.0.1/dns-query
